<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    /* Hidden component — zero height, no layout impact */
    html, body { margin: 0; padding: 0; overflow: hidden; height: 0; }
  </style>
</head>
<body>
<script>
  (function () {
    'use strict';

    // ── Streamlit component protocol ────────────────────────────────────────
    function sendReady() {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: 'streamlit:componentReady', apiVersion: 1 },
        '*'
      );
    }

    function sendValue(value) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: 'streamlit:setComponentValue', value: value },
        '*'
      );
    }

    // ── Relay focus events from parent → this iframe ────────────────────────
    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'askable:focus') {
        sendValue(e.data.focus);
      }
    });

    // ── Inject @askable/core into the parent Streamlit page ─────────────────
    // This works because Streamlit serves custom component frontends from the
    // same origin (localhost:8501 or your deployment domain), so same-origin
    // iframe policies allow access to window.parent.document.
    function injectAskable() {
      var parentWin = window.parent;
      var parentDoc = parentWin.document;

      // Guard: only inject once per page load
      if (parentWin.__askableInjected) return;
      parentWin.__askableInjected = true;

      var script = parentDoc.createElement('script');
      script.type = 'module';
      // Inline the setup so there are no extra network round-trips
      script.textContent = [
        'import { createAskableContext } from "https://esm.sh/@askable/core@0.1.0";',
        'const ctx = createAskableContext();',
        'ctx.observe(document.body);',
        'ctx.on("focus", function(focus) {',
        '  const data = { meta: focus.meta, text: focus.text, timestamp: focus.timestamp };',
        '  // Broadcast to all iframes in the Streamlit page (handles reruns)',
        '  Array.from(document.querySelectorAll("iframe")).forEach(function(frame) {',
        '    try { frame.contentWindow.postMessage({ type: "askable:focus", focus: data }, "*"); }',
        '    catch (err) { /* cross-origin frame — skip */ }',
        '  });',
        '});',
      ].join('\n');

      parentDoc.head.appendChild(script);
    }

    // ── Init ────────────────────────────────────────────────────────────────
    window.addEventListener('load', function () {
      sendReady();
      try {
        injectAskable();
      } catch (e) {
        // Cross-origin restriction — component only works when served from the
        // same origin as the Streamlit app (true for all standard deployments).
        console.warn('[askable] Could not inject into parent document:', e.message);
      }
    });
  })();
</script>
</body>
</html>

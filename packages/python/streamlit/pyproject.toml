[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "askable-streamlit"
version = "0.1.2"
description = "LLM-aware UI focus context for Streamlit — askable Python binding"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "askable-ui contributors"}]
requires-python = ">=3.9"
dependencies = ["streamlit>=1.28.0"]
keywords = ["streamlit", "llm", "ai", "context", "ui"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/askable-ui/askable"
Source = "https://github.com/askable-ui/askable/tree/main/packages/python/streamlit"
"Bug Tracker" = "https://github.com/askable-ui/askable/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"*" = ["frontend/*.html", "frontend/*.js", "frontend/*.css"]

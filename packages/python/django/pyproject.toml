[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "askable-django"
version = "0.1.2"
description = "LLM-aware UI context for Django — template tags + auto-inject middleware"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "askable-ui contributors"}]
requires-python = ">=3.9"
dependencies = ["Django>=4.0"]
keywords = ["django", "llm", "ai", "context", "ui", "templatetag"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: Django",
    "Framework :: Django :: 4.0",
    "Framework :: Django :: 4.2",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/askable-ui/askable"
Source = "https://github.com/askable-ui/askable/tree/main/packages/python/django"
"Bug Tracker" = "https://github.com/askable-ui/askable/issues"

[tool.setuptools.packages.find]
where = ["."]

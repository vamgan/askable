name: Feature Request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried?
    validations:
      required: false

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this relate to?
      options:
        - "@askable-ui/core"
        - "@askable-ui/react"
        - "@askable-ui/vue"
        - "@askable-ui/svelte"
        - "askable-django"
        - "askable-streamlit"
        - "Documentation"
        - "New package"
        - "Other"
    validations:
      required: true

name: Documentation
description: Report a docs issue or suggest an improvement
title: "docs: "
labels: ["documentation"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's wrong or missing in the documentation?
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Page URL
      description: Link to the relevant docs page (if applicable)
      placeholder: "https://askable-ui.com/docs/..."
    validations:
      required: false

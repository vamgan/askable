name: release / github

# Creates a GitHub Release after npm publish succeeds.
# Waits for publish_release.yml to complete so the release is only created
# when packages are actually on npm.

on:
  workflow_run:
    workflows: ["publish / release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run if publish succeeded (or manual dispatch)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve tag and pre-release flag
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ -n "$RUN_HEAD_BRANCH" ]; then
            TAG="$RUN_HEAD_BRANCH"
          else
            echo "::error::Could not resolve tag"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-beta."* || "$TAG" == *"-alpha."* || "$TAG" == *"-rc."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          IS_PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const isPrerelease = process.env.IS_PRERELEASE === 'true';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              prerelease: isPrerelease,
              draft: false,
            });

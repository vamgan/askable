name: publish / python / preview

# Auto-publishes Python packages when pyproject.toml changes on main.
# Uses PyPI Trusted Publishing (OIDC).

on:
  push:
    branches: [main]
    paths:
      - "packages/python/django/pyproject.toml"
      - "packages/python/streamlit/pyproject.toml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.2) — leave blank to read from pyproject.toml"
        required: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        package: [streamlit, django]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          MATRIX_PKG: ${{ matrix.package }}
        run: |
          PKG="packages/python/${MATRIX_PKG}/pyproject.toml"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff HEAD~1 HEAD --name-only -- "$PKG" | head -1)
            if [ -z "$CHANGED" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            VERSION=$(grep '^version = ' "$PKG" | sed 's/version = "\(.*\)"/\1/')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build
        if: steps.version.outputs.changed == 'true'
        working-directory: packages/python/${{ matrix.package }}
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.version.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/${{ matrix.package }}/dist
          verbose: true

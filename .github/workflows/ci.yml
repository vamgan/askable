name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build packages
        run: npm run build --workspaces --if-present

  docs-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install docs dependencies
        run: npm install
        working-directory: site/docs

      - name: Build docs
        run: npm run build
        working-directory: site/docs

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build packages
        run: npm run build --workspaces --if-present

  docs-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install docs dependencies
        run: npm install
        working-directory: site/docs

      - name: Build docs
        run: npm run build
        working-directory: site/docs

  perf-budget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install jsdom
        run: npm install --save-dev jsdom

      - name: Build core
        run: npm run build -w packages/core

      - name: Run performance budget
        run: npm run bench:ci -w packages/core

  python-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Install shared serializer package
        run: pip install -e packages/python/shared/

      - name: Run shared serializer tests
        run: pytest packages/python/shared/askable/tests/ -v

      - name: Install Django package
        run: pip install -e packages/python/django/

      - name: Run Django smoke tests
        run: pytest packages/python/django/tests/ -v

      - name: Install Streamlit package
        run: pip install -e packages/python/streamlit/

      - name: Run Streamlit smoke tests
        run: pytest packages/python/streamlit/tests/ -v

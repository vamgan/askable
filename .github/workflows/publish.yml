name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.2) — leave blank to use packages/core/package.json'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff HEAD~1 HEAD --name-only -- 'packages/*/package.json' | head -1)
            if [ -z "$CHANGED" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            VERSION=$(node -p "require('./packages/core/package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Build all packages
        if: steps.version.outputs.changed == 'true'
        run: npm run build --workspaces --if-present

      - name: Publish packages
        if: steps.version.outputs.changed == 'true'
        run: npm publish --workspaces --access public --provenance

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG" || echo "Tag already exists, skipping"
          git push origin "$TAG" || echo "Tag already pushed, skipping"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            || echo "Release already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

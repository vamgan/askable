name: publish / release

# Triggered by tag/auto via workflow_dispatch, or manual tag pushes.
# Uses npm OIDC Trusted Publisher — no NPM_TOKEN needed.
#
# Setup: npmjs.com → package → Settings → Publishing → Add Trusted Publisher
#   Repository:  askable-ui/askable
#   Workflow:    publish_release.yml
#   Environment: (leave blank)
#
# Modeled after: Vite (vitejs/vite), Effect-TS, shadcn/ui

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.1)"
        required: true

permissions:
  contents: read
  id-token: write # required for npm OIDC provenance

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve tag
        id: resolve-tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-tag.outputs.tag }}

      # Node 24 ships npm 11.5.1+ which fixes the OIDC bug for scoped
      # packages (npm/cli#9088). Do NOT use Node 20/22 — they have npm v10
      # which silently fails OIDC token exchange for @scoped packages.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Build all packages
        run: npm run build --workspaces --if-present

      # Tests already run in CI before merge. Skip here to avoid
      # Node 24 jsdom compat issues and speed up the publish.

      - name: Resolve dist-tag
        id: dist-tag
        env:
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        run: |
          if [[ "$RELEASE_TAG" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$RELEASE_TAG" == *"-alpha."* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$RELEASE_TAG" == *"-rc."* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @askable-ui/core
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/core

      - name: Publish @askable-ui/react
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/react

      - name: Publish @askable-ui/vue
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/vue

      - name: Publish @askable-ui/svelte
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/svelte

      - name: Publish @askable-ui/react-native
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/react-native

      - name: Publish create-askable-app
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --provenance --tag "$DIST_TAG"
        working-directory: packages/create-askable-app

name: publish / release

# Triggered by version tags. Uses npm OIDC Trusted Publisher — no secret needed.
#
# Setup: npmjs.com → package → Settings → Publishing → Add Trusted Publisher
#   Repository:  askable-ui/askable
#   Workflow:    .github/workflows/publish_release.yml
#   Environment: (leave blank)
#
#   v1.2.3         → stable release  (dist-tag "latest")
#   v1.2.3-beta.1  → pre-release     (dist-tag "beta")

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.1)"
        required: true

permissions:
  contents: read
  id-token: write # required for npm OIDC provenance

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # setup-node with registry-url configures .npmrc for OIDC automatically.
      # Do NOT manually write to .npmrc — it will clobber the auth config.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Run tests
        run: npm test

      - name: Resolve dist-tag
        id: dist-tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [[ "$INPUT_TAG" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_TAG" == *"-alpha."* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_TAG" == *"-rc."* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @askable-ui/core
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/core

      - name: Publish @askable-ui/react
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/react

      - name: Publish @askable-ui/vue
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/vue

      - name: Publish @askable-ui/svelte
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        working-directory: packages/svelte

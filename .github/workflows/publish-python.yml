name: Publish Python packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/python/*/pyproject.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.2) — leave blank to read from pyproject.toml'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    strategy:
      matrix:
        package: [streamlit, django]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve version
        id: version
        run: |
          PKG=packages/python/${{ matrix.package }}/pyproject.toml
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff HEAD~1 HEAD --name-only -- "$PKG" | head -1)
            if [ -z "$CHANGED" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            VERSION=$(grep '^version = ' "$PKG" | sed 's/version = "\(.*\)"/\1/')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.version.outputs.changed == 'true'
        with:
          python-version: '3.11'

      - name: Build
        if: steps.version.outputs.changed == 'true'
        working-directory: packages/python/${{ matrix.package }}
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.version.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/${{ matrix.package }}/dist
          verbose: true
